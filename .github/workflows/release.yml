name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS (Intel)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows (x64)

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: RuneWise ${{ github.ref_name }}
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  release-notes:
    needs: build
    runs-on: ubuntu-latest
    name: Update Release Notes

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(gh release list --limit 2 --json tagName --jq '.[1].tagName // empty')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name=${{ github.ref_name }} \
              -f previous_tag_name="$PREV_TAG" \
              --jq '.body')
          else
            NOTES="Initial release"
          fi
          gh release edit ${{ github.ref_name }} --notes "$NOTES"

  prune-old-releases:
    needs: release-notes
    runs-on: ubuntu-latest
    name: Prune Old Releases

    steps:
      - name: Delete all releases except the current tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          # Keep only the just-published release. Git tags are preserved (--cleanup-tag=false)
          # so history and commit-SHA lookups still work; only the release + binaries are removed.
          gh release list --repo "$REPO" --limit 100 --json tagName --jq '.[].tagName' \
            | grep -vxF "$CURRENT_TAG" \
            | while IFS= read -r tag; do
                echo "Deleting release $tag"
                gh release delete "$tag" --yes --cleanup-tag=false --repo "$REPO" || true
              done
